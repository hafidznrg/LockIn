<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LockIn - Focus in Style</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1 class="brand-title">LockIn</h1>
      </header>

      <button class="sound-toggle" id="soundToggle" title="Toggle Sound">
        <i data-lucide="volume-2"></i>
      </button>

      <section class="timer-section glass-card">
        <div class="timer-container">
          <svg class="timer-circle" viewBox="0 0 300 300">
            <circle class="circle-bg" cx="150" cy="150" r="135"></circle>
            <circle class="circle-progress" id="progressCircle" cx="150" cy="150" r="135"></circle>
          </svg>
          <div class="timer-display">
            <div class="timer-mode" id="timerMode">Focus</div>
            <div class="timer-time" id="timerTime">25:00</div>
          </div>
        </div>

        <div class="controls">
          <button class="btn btn-icon btn-secondary" id="stopBtn" title="Stop">
            <i data-lucide="square"></i>
          </button>
          <button class="btn btn-primary" id="startBtn">
            <i data-lucide="play" id="startIcon"></i>
            <span id="startText">Start</span>
          </button>
          <button class="btn btn-icon btn-secondary" id="resetBtn" title="Reset">
            <i data-lucide="rotate-ccw"></i>
          </button>
          <button class="btn btn-icon btn-secondary" id="skipBtn" title="Skip">
            <i data-lucide="skip-forward"></i>
          </button>
        </div>
      </section>

      <section class="task-manager glass-card">
        <div class="current-task-box">
          <i data-lucide="zap" style="color: var(--sage-primary)"></i>
          <input type="text" id="taskInput" class="task-input" placeholder="Currently locking in on..." maxlength="50">
        </div>

        <div class="settings-section">
          <div class="setting-item">
            <label class="setting-label">Work</label>
            <input type="number" id="workDuration" class="duration-input" value="25" min="1" max="60">
          </div>
          <div class="setting-item">
            <label class="setting-label">Short</label>
            <input type="number" id="shortDuration" class="duration-input" value="5" min="1" max="30">
          </div>
          <div class="setting-item">
            <label class="setting-label">Long</label>
            <input type="number" id="longDuration" class="duration-input" value="15" min="1" max="60">
          </div>
        </div>
      </section>

      <div class="mode-tabs controls" style="margin-top: 0">
        <button class="btn btn-secondary active" data-mode="work">Focus</button>
        <button class="btn btn-secondary" data-mode="shortBreak">Short Break</button>
        <button class="btn btn-secondary" data-mode="longBreak">Long Break</button>
      </div>
    </div>
    <script type="module" src="/src/ts/main.ts"></script>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();
    </script>
  </body>
</html>
