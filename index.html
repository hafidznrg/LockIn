<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LockIn - Focus in Style</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="bg-overlay"></div>
    <div id="app">
      <div class="app-layout">
        <main class="timer-section">
          <header class="header">
        <img src="/logo.svg" alt="LockIn Logo" class="brand-logo" />
        <h1 class="brand-title">LockIn</h1>
        <p class="brand-subtitle" id="timerMode">Focus Session</p>
      </header>

      <div class="top-actions">
        <button class="action-btn" id="notificationToggle" title="Toggle Notifications">
          <i data-lucide="bell-off"></i>
        </button>
        <button class="action-btn" id="soundToggle" title="Toggle Sound">
          <i data-lucide="volume-2"></i>
        </button>
      </div>

      <!-- Direct children for universal spacing -->
      <div class="timer-container glass-circle">
        <svg class="timer-circle-svg" viewBox="0 0 300 300">
          <defs>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="5" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>
          <circle class="circle-bg" cx="150" cy="150" r="135"></circle>
          <circle class="circle-progress" id="progressCircle" cx="150" cy="150" r="135" filter="url(#glow)"></circle>
        </svg>
        <div class="timer-display">
          <div class="timer-time-wrapper">
            <input type="text" id="timerTimeInput" class="timer-time-input" value="25:00" spellcheck="false">
            <div class="timer-time" id="timerTime">25:00</div>
          </div>
          <div class="timer-hint">Click to adjust</div>
          <div class="timer-sessions" id="currentSessionDuration">25m</div>
        </div>
      </div>

      <section class="task-manager floating-glass">
        <div class="task-box">
          <label for="taskInput" class="task-label">Currently locking in on...</label>
          <div class="task-input-wrapper">
            <input type="text" id="taskInput" class="task-input" placeholder="Write your focus here..." maxlength="50">
            <i data-lucide="edit-3" class="task-icon"></i>
          </div>
        </div>
      </section>

      <div class="main-controls">
        <div class="control-group">
          <button class="glass-btn btn-round" id="resetBtn" title="Reset">
            <i data-lucide="rotate-ccw"></i>
          </button>
          <span class="control-label">Reset</span>
        </div>
        
        <div class="control-group">
          <button class="glass-btn btn-round" id="startBtn" title="Start/Pause">
            <i data-lucide="play" id="startIcon"></i>
          </button>
          <span class="control-label" id="startLabel">Start</span>
        </div>

        <div class="control-group">
          <button class="glass-btn btn-round" id="skipBtn" title="Skip">
            <i data-lucide="skip-forward"></i>
          </button>
          <span class="control-label">Skip</span>
        </div>
      </div>

      <div class="mode-tabs">
        <button class="mode-btn active" data-mode="work">Focus</button>
        <button class="mode-btn" data-mode="shortBreak">Short</button>
        <button class="mode-btn" data-mode="longBreak">Long</button>
      </div>
        </main>

        <aside class="todo-section">
          <div class="todo-header">
            <h2>Tasks</h2>
            <span id="todoCount" class="todo-count">0/0</span>
          </div>
          <div class="todo-input-wrapper">
            <input type="text" id="newTodoInput" class="todo-input" placeholder="Add a new task..." maxlength="100">
            <button id="addTodoBtn" class="todo-add-btn" title="Add Task">
              <i data-lucide="plus"></i>
            </button>
          </div>
          <ul id="todoList" class="todo-list">
          </ul>
        </aside>
      </div>

      
      <!-- Hidden settings for duration sync -->
      <div style="display: none;">
        <input type="number" id="workDuration" value="25">
        <input type="number" id="shortDuration" value="5">
        <input type="number" id="longDuration" value="15">
        <button id="stopBtn"></button>
      </div>
    </div>

    <!-- Custom Modal -->
    <div id="customModal" class="modal-overlay">
      <div class="modal-content floating-glass">
        <div class="modal-header">
          <h2 id="modalTitle">Adjust Duration?</h2>
          <button class="modal-close" id="modalClose">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="modal-body">
          <p id="modalMessage">Do you want to adjust the duration for the current session? This will reset your progress.</p>
        </div>
        <div class="modal-footer">
          <button class="modal-btn secondary" id="modalCancel">Cancel</button>
          <button class="modal-btn primary" id="modalConfirm">Confirm</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/ts/main.ts"></script>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();
    </script>
  </body>
</html>
